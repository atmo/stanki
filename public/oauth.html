    <title>Stanki — signing in</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;

  <body>
    <!--
      Redirect target for the Stanki browser extension's Google sign-in.
      The extension injects a content script here that reads the access token
      from the URL fragment and hands it back to the extension, then closes the
      tab. This page intentionally has no script of its own.
    -->
    <p>Signing in to Stanki… you can close this tab.</p>
  </body>
